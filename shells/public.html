<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07080c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/sway.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sway" />
    <meta property="og:title" content="Sway | Live Crowd Requests" />
    <meta property="og:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />
    <meta property="og:url" content="https://sway.tips/" />
    <meta property="og:image" content="https://sway.tips/assets/sway-s-only-no-text-background.png?v=1" />
    <meta property="og:image:secure_url" content="https://sway.tips/assets/sway-s-only-no-text-background.png?v=1" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1536" />
    <meta property="og:image:alt" content="Sway neon S background" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sway | Live Crowd Requests" />
    <meta name="twitter:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />
    <meta name="twitter:image" content="https://sway.tips/assets/sway-s-only-no-text-background.png?v=1" />
    <title>Sway | Live Crowd Requests</title>
    <meta
      name="description"
      content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const root = document.documentElement;
        const isMetaInAppBrowser = /FBAN|FBAV|FB_IAB|FB4A|FBIOS|MessengerForiOS|FB_IAB\/MESSENGER/i.test(navigator.userAgent || '');
        const updateViewport = () => {
          const viewport = window.visualViewport;
          const width = Math.max(1, Math.round((viewport && viewport.width) || window.innerWidth || root.clientWidth));
          const height = Math.max(1, Math.round((viewport && viewport.height) || window.innerHeight || root.clientHeight));
          root.style.setProperty('--sway-viewport-width', `${width}px`);
          root.style.setProperty('--sway-viewport-height', `${height}px`);
          root.classList.toggle('is-compact-viewport', width <= 640 && height <= 760);
          root.classList.toggle('is-compact-landscape', height <= 480 && width > height);
        };

        root.classList.toggle('is-meta-in-app-browser', isMetaInAppBrowser);
        updateViewport();
        window.addEventListener('resize', updateViewport, { passive: true });
        window.addEventListener('orientationchange', updateViewport, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateViewport, { passive: true });
          window.visualViewport.addEventListener('scroll', updateViewport, { passive: true });
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --sway-viewport-width: 100vw;
        --sway-viewport-height: 100vh;
        --sway-safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f8fafc;
        background: #02030a;
        position: relative;
        overflow-x: hidden;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        height: 100vh;
        height: 100svh;
        height: var(--sway-viewport-height, 100vh);
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 36%, rgba(217, 70, 239, 0.2), transparent 30%),
          radial-gradient(circle at 50% 78%, rgba(6, 182, 212, 0.24), transparent 30%),
          #02030a;
      }

      .landing-aurora-field,
      .landing-bg-art {
        position: absolute;
        user-select: none;
        -webkit-user-drag: none;
        will-change: transform, filter, opacity;
      }

      .landing-aurora-field {
        inset: -18%;
        background:
          linear-gradient(112deg, transparent 0 18%, rgba(236, 72, 153, 0.24) 34%, transparent 56%),
          linear-gradient(248deg, transparent 0 20%, rgba(34, 211, 238, 0.22) 42%, transparent 66%),
          linear-gradient(180deg, rgba(10, 3, 28, 0.72), rgba(2, 3, 10, 0.06) 42%, rgba(3, 12, 28, 0.7));
        filter: blur(38px) saturate(1.18);
        opacity: 0.74;
        transform-origin: center;
        animation: landing-aurora-pan 16s ease-in-out infinite alternate;
      }

      .landing-bg-art {
        left: 50%;
        top: 50%;
        width: min(88vw, 1040px);
        height: min(94vh, 1380px);
        height: min(calc(var(--sway-viewport-height, 100vh) * 0.94), 1380px);
        object-fit: contain;
        object-position: 50% 50%;
        transform: translate(-50%, -50%);
        mix-blend-mode: screen;
        opacity: 0.94;
        -webkit-mask-image: radial-gradient(ellipse at 50% 53%, #000 0 46%, rgba(0, 0, 0, 0.78) 60%, transparent 78%);
        mask-image: radial-gradient(ellipse at 50% 53%, #000 0 46%, rgba(0, 0, 0, 0.78) 60%, transparent 78%);
        animation: landing-art-breathe 6.4s ease-in-out infinite;
      }

      .landing-wave-ribbon,
      .landing-neon-breathe,
      .landing-light-sweep,
      .landing-particles {
        position: absolute;
        pointer-events: none;
      }

      .landing-glow {
        position: absolute;
        inset: auto 0 0;
        height: 36vh;
        height: calc(var(--sway-viewport-height, 100vh) * 0.36);
        background: linear-gradient(90deg, rgba(236, 72, 153, 0.28), rgba(6, 182, 212, 0.28));
        filter: blur(50px);
        opacity: 0.58;
        animation: landing-neon-breathe 4.8s ease-in-out infinite;
      }

      .landing-wave-ribbon {
        left: -10%;
        right: -10%;
        bottom: 14%;
        height: 34vh;
        height: calc(var(--sway-viewport-height, 100vh) * 0.34);
        background:
          linear-gradient(105deg, transparent 0%, rgba(236, 72, 153, 0.34) 18%, transparent 35%),
          linear-gradient(78deg, transparent 22%, rgba(34, 211, 238, 0.32) 54%, transparent 80%),
          radial-gradient(ellipse at 48% 82%, rgba(236, 72, 153, 0.36), transparent 60%);
        filter: blur(14px);
        mix-blend-mode: screen;
        -webkit-mask-image: linear-gradient(to top, transparent, #000 26%, #000 74%, transparent);
        mask-image: linear-gradient(to top, transparent, #000 26%, #000 74%, transparent);
        animation: landing-wave-drift 5.6s ease-in-out infinite;
      }

      .landing-neon-breathe {
        left: 8%;
        right: 8%;
        bottom: 0;
        height: 30vh;
        height: calc(var(--sway-viewport-height, 100vh) * 0.3);
        background:
          radial-gradient(ellipse at 30% 58%, rgba(236, 72, 153, 0.28), transparent 56%),
          radial-gradient(ellipse at 70% 52%, rgba(34, 211, 238, 0.28), transparent 58%);
        filter: blur(32px);
        mix-blend-mode: screen;
        opacity: 0.72;
        animation: landing-neon-breathe 5.2s ease-in-out infinite reverse;
      }

      .landing-light-sweep {
        inset: -16% -36%;
        background: linear-gradient(110deg, transparent 20%, rgba(255, 255, 255, 0.24) 48%, transparent 64%);
        mix-blend-mode: screen;
        opacity: 0;
        animation: landing-light-sweep 6.8s ease-in-out infinite;
      }

      .landing-particles {
        inset: 0;
        background-image:
          radial-gradient(circle, rgba(244, 114, 182, 0.42) 0 1px, transparent 1.8px),
          radial-gradient(circle, rgba(34, 211, 238, 0.36) 0 1px, transparent 1.8px);
        background-position: 16% 64%, 82% 58%;
        background-size: 96px 96px, 128px 128px;
        filter: blur(0.2px);
        opacity: 0.32;
        -webkit-mask-image: radial-gradient(ellipse at 50% 62%, transparent 0 24%, #000 48%, transparent 82%);
        mask-image: radial-gradient(ellipse at 50% 62%, transparent 0 24%, #000 48%, transparent 82%);
        animation: landing-particle-drift 10s linear infinite;
      }

      .landing-vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 50%, transparent 0 30%, rgba(2, 3, 10, 0.24) 58%, rgba(2, 3, 10, 0.86) 100%),
          linear-gradient(180deg, rgba(2, 3, 10, 0.5), rgba(2, 3, 10, 0.04) 38%, rgba(2, 3, 10, 0.62));
      }

      @keyframes landing-aurora-pan {
        0% {
          transform: scale(1.02) translate3d(-2.4%, -1.6%, 0);
          filter: blur(34px) saturate(1.08) brightness(0.84) contrast(1.04);
        }
        50% {
          transform: scale(1.08) translate3d(2.2%, 1%, 0);
          filter: blur(42px) saturate(1.26) brightness(1) contrast(1.08);
        }
        100% {
          transform: scale(1.04) translate3d(-1.2%, 2.2%, 0);
          filter: blur(36px) saturate(1.14) brightness(0.9) contrast(1.06);
        }
      }

      @keyframes landing-art-breathe {
        0%, 100% {
          transform: translate(-50%, -50%) scale(1);
          filter: saturate(1.08) brightness(0.92) contrast(1.04);
          opacity: 0.88;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.055);
          filter: saturate(1.34) brightness(1.12) contrast(1.1);
          opacity: 1;
        }
      }

      @keyframes landing-neon-breathe {
        0%, 100% { opacity: 0.46; transform: translateY(0) scaleX(1); }
        50% { opacity: 0.96; transform: translateY(-12px) scaleX(1.12); }
      }

      @keyframes landing-wave-drift {
        0%, 100% { transform: translateX(-4%) skewY(-1.5deg); opacity: 0.48; }
        50% { transform: translateX(4%) skewY(1.5deg); opacity: 0.96; }
      }

      @keyframes landing-light-sweep {
        0%, 22% { opacity: 0; transform: translateX(-72%) rotate(-8deg); }
        43% { opacity: 0.42; }
        68%, 100% { opacity: 0; transform: translateX(72%) rotate(-8deg); }
      }

      @keyframes landing-particle-drift {
        0% { background-position: 16% 64%, 82% 58%; }
        100% { background-position: 36% 56%, 66% 70%; }
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(72px, 12vh, 132px) 16px 32px;
      }

      .cta-stack {
        display: grid;
        width: min(430px, 100%);
        gap: 12px;
        text-align: center;
      }

      .entry-card {
        display: grid;
        gap: 14px;
        padding: 20px 18px 16px;
        border-radius: 28px;
        border: 1px solid rgba(244, 114, 182, 0.2);
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.58), rgba(2, 6, 23, 0.78));
        box-shadow: 0 28px 80px rgba(2, 6, 23, 0.72);
        backdrop-filter: blur(18px);
      }

      .entry-copy {
        display: grid;
        gap: 6px;
      }

      .entry-eyebrow {
        color: rgba(240, 171, 252, 0.96);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }

      .entry-title {
        margin: 0;
        color: #fff;
        font-size: clamp(28px, 7vw, 36px);
        font-weight: 900;
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .entry-support {
        margin: 0;
        color: rgba(226, 232, 240, 0.88);
        font-size: 14px;
        line-height: 1.45;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #f8fafc;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
      }

      .btn.primary {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, rgba(219, 39, 219, 0.95), rgba(217, 70, 239, 0.92));
        border-color: rgba(244, 114, 182, 0.48);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.42);
      }

      .btn.secondary {
        background: rgba(2, 6, 23, 0.62);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(232, 121, 249, 0.55);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.26);
      }

      .tagline {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        color: #f0abfc;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-shadow: 0 0 18px rgba(217, 70, 239, 0.58);
      }

      .entry-note {
        margin: 0;
        color: rgba(203, 213, 225, 0.82);
        font-size: 12px;
        font-weight: 600;
      }

      footer {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 22px 0 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: center;
      }

      footer a {
        color: rgba(148, 163, 184, 0.76);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      footer a:hover { color: #e2e8f0; }

      @media (max-width: 640px) {
        .landing-aurora-field {
          inset: -22%;
          opacity: 0.78;
        }

        .landing-bg-art {
          top: 40%;
          width: min(142vw, 680px);
          height: min(80vh, 860px);
          height: min(calc(var(--sway-viewport-height, 100vh) * 0.8), 860px);
          opacity: 0.96;
          -webkit-mask-image: radial-gradient(ellipse at 50% 52%, #000 0 50%, rgba(0, 0, 0, 0.76) 64%, transparent 82%);
          mask-image: radial-gradient(ellipse at 50% 52%, #000 0 50%, rgba(0, 0, 0, 0.76) 64%, transparent 82%);
        }

        .landing-wave-ribbon {
          bottom: 24%;
          height: 26vh;
          filter: blur(12px);
        }

        .landing-particles {
          opacity: 0.26;
          background-size: 82px 82px, 112px 112px;
        }

        main {
          align-items: flex-end;
          padding: 42vh 16px 20px;
          padding: calc(var(--sway-viewport-height, 100vh) * 0.42) 16px 20px;
        }

        .cta-stack {
          width: min(100%, 390px);
          gap: 10px;
        }

        .entry-card {
          gap: 12px;
          padding: 18px 16px 14px;
          border-radius: 24px;
        }

        .entry-title {
          font-size: 30px;
        }

        .entry-support {
          font-size: 13px;
        }

        .btn {
          min-height: 56px;
          border-radius: 13px;
        }

        .tagline {
          min-height: 38px;
          font-size: 14px;
        }

        footer {
          width: min(100% - 24px, 390px);
          gap: 12px 16px;
          padding: 12px 0 calc(20px + env(safe-area-inset-bottom));
          padding: 12px 0 calc(20px + var(--sway-safe-bottom, 0px));
        }

        footer a {
          font-size: 11px;
        }
      }

      @media (max-width: 640px) and (max-height: 760px) {
        .landing-bg-art {
          top: 37%;
          width: min(130vw, 560px);
          height: min(72vh, 660px);
          height: min(calc(var(--sway-viewport-height, 100vh) * 0.72), 660px);
        }

        main {
          padding-bottom: 12px;
        }

        .cta-stack {
          gap: 9px;
        }

        .btn {
          min-height: 52px;
        }

        .tagline {
          min-height: 34px;
          font-size: 13px;
        }

        footer {
          gap: 8px 14px;
          padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
          padding: 8px 0 calc(12px + var(--sway-safe-bottom, 0px));
        }

        footer a {
          font-size: 10.5px;
        }
      }

      @media (max-height: 480px) and (orientation: landscape) {
        .landing-bg-art {
          width: min(86vw, 720px);
          height: min(94vh, 520px);
          height: min(calc(var(--sway-viewport-height, 100vh) * 0.94), 520px);
        }

        .landing-wave-ribbon {
          bottom: 10%;
          height: 34vh;
        }

        main {
          padding: 48px 16px 10px;
        }

        .cta-stack {
          width: min(430px, 52vw);
          gap: 8px;
        }

        .btn {
          min-height: 46px;
        }

        .tagline {
          min-height: 30px;
          font-size: 13px;
        }

        footer {
          width: min(calc(100% - 24px), 760px);
          gap: 10px 16px;
          padding: 6px 0 8px;
        }
      }

      html.is-meta-in-app-browser body {
        overscroll-behavior-y: none;
      }

      html.is-meta-in-app-browser .backdrop {
        position: absolute;
      }

      html.is-meta-in-app-browser .btn {
        -webkit-tap-highlight-color: transparent;
      }

      html.is-compact-viewport .landing-bg-art {
        top: 37%;
        width: min(130vw, 560px);
        height: min(calc(var(--sway-viewport-height, 100vh) * 0.72), 660px);
      }

      html.is-compact-viewport main {
        padding-bottom: 12px;
      }

      html.is-compact-viewport .cta-stack {
        gap: 9px;
      }

      html.is-compact-viewport .btn {
        min-height: 52px;
      }

      html.is-compact-viewport .tagline {
        min-height: 34px;
        font-size: 13px;
      }

      html.is-compact-viewport footer {
        gap: 8px 14px;
        padding: 8px 0 calc(12px + var(--sway-safe-bottom, 0px));
      }

      html.is-compact-viewport footer a {
        font-size: 10.5px;
      }

      html.is-compact-landscape .landing-bg-art {
        width: min(86vw, 720px);
        height: min(calc(var(--sway-viewport-height, 100vh) * 0.94), 520px);
      }

      html.is-compact-landscape .landing-wave-ribbon {
        bottom: 10%;
        height: calc(var(--sway-viewport-height, 100vh) * 0.34);
      }

      html.is-compact-landscape main {
        padding: 48px 16px 10px;
      }

      html.is-compact-landscape .cta-stack {
        width: min(430px, 52vw);
        gap: 8px;
      }

      html.is-compact-landscape .btn {
        min-height: 46px;
      }

      html.is-compact-landscape .tagline {
        min-height: 30px;
        font-size: 13px;
      }

      html.is-compact-landscape footer {
        width: min(calc(100% - 24px), 760px);
        gap: 10px 16px;
        padding: 6px 0 8px;
      }

      @media (prefers-reduced-motion: reduce) {
        .landing-aurora-field,
        .landing-bg-art,
        .landing-glow,
        .landing-wave-ribbon,
        .landing-neon-breathe,
        .landing-light-sweep,
        .landing-particles { animation: none; }
        .btn { transition: none; }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <div class="landing-aurora-field"></div>
      <img class="landing-bg-art" src="/assets/sway-s-only-no-text-background.png" alt="" decoding="async" />
      <div class="landing-wave-ribbon"></div>
      <div class="landing-neon-breathe"></div>
      <div class="landing-light-sweep"></div>
      <div class="landing-particles"></div>
      <div class="landing-glow"></div>
      <div class="landing-vignette"></div>
    </div>

    <div class="shell">
      <main>
        <nav class="cta-stack" aria-label="Sway entry actions">
          <div class="entry-card">
            <div class="entry-copy">
              <span class="entry-eyebrow">Sway entry</span>
              <h1 class="entry-title">Join the live room.</h1>
              <p class="entry-support">Scan the venue QR, send a request or tip, and track the queue from your phone.</p>
            </div>
            <a class="btn primary" href="/home">SCAN</a>
            <a class="btn secondary" href="/talent/signup">Create account</a>
            <a class="btn secondary" href="/talent/login">Login</a>
            <p class="entry-note">Performer tools stay behind your private sign-in.</p>
            <a class="tagline" href="/faq">Sway to play</a>
          </div>
        </nav>
      </main>

      <footer>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/faq">FAQ</a>
        <a href="/support">Support</a>
        <a href="/privacy/data-deletion">Data deletion</a>
        <a href="/overlay/live">Open overlay</a>
      </footer>
    </div>
  </body>
</html>
