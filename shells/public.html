<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sway | Live Crowd Requests" />
    <meta name="twitter:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />
    <meta name="twitter:image" content="https://sway.tips/assets/sway-neon-background.png?v=1" />
    <title>Sway | Live Crowd Requests</title>
    <meta
      name="description"
      content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const root = document.documentElement;
        const isMetaInAppBrowser = /FBAN|FBAV|FB_IAB|FB4A|FBIOS|MessengerForiOS|FB_IAB\/MESSENGER/i.test(navigator.userAgent || '');
        const updateViewport = () => {
          const viewport = window.visualViewport;
          const width = Math.max(1, Math.round((viewport && viewport.width) || window.innerWidth || root.clientWidth));
          const height = Math.max(1, Math.round((viewport && viewport.height) || window.innerHeight || root.clientHeight));
          root.style.setProperty('--sway-viewport-width', `${width}px`);
          root.style.setProperty('--sway-viewport-height', `${height}px`);
          root.classList.toggle('is-compact-viewport', width <= 640 && height <= 760);
          root.classList.toggle('is-compact-landscape', height <= 480 && width > height);
        };

        root.classList.toggle('is-meta-in-app-browser', isMetaInAppBrowser);
        updateViewport();
        window.addEventListener('resize', updateViewport, { passive: true });
        window.addEventListener('orientationchange', updateViewport, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateViewport, { passive: true });
          window.visualViewport.addEventListener('scroll', updateViewport, { passive: true });
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --sway-viewport-width: 100vw;
        --sway-viewport-height: 100vh;
        --sway-safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f8fafc;
        background: #02030a;
        position: relative;
        overflow-x: hidden;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        height: 100vh;
        height: 100svh;
        height: var(--sway-viewport-height, 100vh);
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background: #02030a;
      }

      .backdrop img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 50%;
        transform: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(72px, 12vh, 132px) 16px 32px;
      }

      .cta-stack {
        display: grid;
        width: min(430px, 100%);
        gap: 12px;
        text-align: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #f8fafc;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
      }

      .btn.primary {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, rgba(219, 39, 219, 0.95), rgba(217, 70, 239, 0.92));
        border-color: rgba(244, 114, 182, 0.48);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.42);
      }

      .btn.secondary {
        background: rgba(2, 6, 23, 0.62);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(232, 121, 249, 0.55);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.26);
      }

      .tagline {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        color: #f0abfc;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-shadow: 0 0 18px rgba(217, 70, 239, 0.58);
      }

      footer {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 22px 0 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: center;
      }

      footer a {
        color: rgba(148, 163, 184, 0.76);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      footer a:hover { color: #e2e8f0; }

      @media (max-width: 640px) {
        .backdrop img {
          object-position: 50% 42%;
        }

        main {
          align-items: flex-end;
          padding: 0 16px calc(70px + env(safe-area-inset-bottom));
          padding: 0 16px calc(70px + var(--sway-safe-bottom, 0px));
        }

        .cta-stack {
          width: min(100%, 390px);
          gap: 10px;
        }

        .btn {
          min-height: 56px;
          border-radius: 13px;
        }

        .tagline {
          min-height: 38px;
          font-size: 14px;
        }

        footer {
          width: min(100% - 24px, 390px);
          gap: 12px 16px;
          padding: 12px 0 calc(20px + env(safe-area-inset-bottom));
          padding: 12px 0 calc(20px + var(--sway-safe-bottom, 0px));
        }

        footer a {
          font-size: 11px;
        }
      }

      @media (max-width: 640px) and (max-height: 760px) {
        main {
          padding-bottom: calc(42px + env(safe-area-inset-bottom));
          padding-bottom: calc(42px + var(--sway-safe-bottom, 0px));
        }

        .cta-stack {
          gap: 9px;
        }

        .btn {
          min-height: 52px;
        }

        .tagline {
          min-height: 34px;
          font-size: 13px;
        }

        footer {
          gap: 8px 14px;
          padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
          padding: 8px 0 calc(12px + var(--sway-safe-bottom, 0px));
        }

        footer a {
          font-size: 10.5px;
        }
      }

      @media (max-height: 480px) and (orientation: landscape) {
        main {
          padding: 48px 16px 10px;
        }

        .cta-stack {
          width: min(430px, 52vw);
          gap: 8px;
        }

        .btn {
          min-height: 46px;
        }

        .tagline {
          min-height: 30px;
          font-size: 13px;
        }

        footer {
          width: min(calc(100% - 24px), 760px);
          gap: 10px 16px;
          padding: 6px 0 8px;
        }
      }

      html.is-meta-in-app-browser body {
        overscroll-behavior-y: none;
      }

      html.is-meta-in-app-browser .backdrop {
        position: absolute;
      }

      html.is-meta-in-app-browser .btn {
        -webkit-tap-highlight-color: transparent;
      }

      html.is-compact-viewport main {
        padding-bottom: calc(42px + var(--sway-safe-bottom, 0px));
      }

      html.is-compact-viewport .cta-stack {
        gap: 9px;
      }

      html.is-compact-viewport .btn {
        min-height: 52px;
      }

      html.is-compact-viewport .tagline {
        min-height: 34px;
        font-size: 13px;
      }

      html.is-compact-viewport footer {
        gap: 8px 14px;
        padding: 8px 0 calc(12px + var(--sway-safe-bottom, 0px));
      }

      html.is-compact-viewport footer a {
        font-size: 10.5px;
      }

      html.is-compact-landscape main {
        padding: 48px 16px 10px;
      }

      html.is-compact-landscape .cta-stack {
        width: min(430px, 52vw);
        gap: 8px;
      }

      html.is-compact-landscape .btn {
        min-height: 46px;
      }

      html.is-compact-landscape .tagline {
        min-height: 30px;
        font-size: 13px;
      }

      html.is-compact-landscape footer {
        width: min(calc(100% - 24px), 760px);
        gap: 10px 16px;
        padding: 6px 0 8px;
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <img src="/assets/sway-neon-background.png" alt="" />
    </div>

    <div class="shell">
      <main>
        <nav class="cta-stack" aria-label="Sway entry actions">
          <a class="btn primary" href="/home">SCAN</a>
          <a class="btn secondary" href="/talent/signup">Create account</a>
          <a class="btn secondary" href="/talent/login">Login</a>
          <a class="tagline" href="/faq">sway to play</a>
        </nav>
      </main>

      <footer>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/faq">FAQ</a>
        <a href="/support">Support</a>
        <a href="/privacy/data-deletion">Data deletion</a>
      </footer>
    </div>
  </body>
</html>
