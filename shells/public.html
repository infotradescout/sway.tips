<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07080c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sway | Live Crowd Requests" />
    <meta name="twitter:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />
    <meta name="twitter:image" content="https://sway.tips/assets/sway-neon-background.png?v=1" />
    <title>Sway | Live Crowd Requests</title>
    <meta
      name="description"
      content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const root = document.documentElement;
        const isMetaInAppBrowser = /FBAN|FBAV|FB_IAB|FB4A|FBIOS|MessengerForiOS|FB_IAB\/MESSENGER/i.test(navigator.userAgent || '');
        const updateViewport = () => {
          const viewport = window.visualViewport;
          const width = Math.max(1, Math.round((viewport && viewport.width) || window.innerWidth || root.clientWidth));
          const height = Math.max(1, Math.round((viewport && viewport.height) || window.innerHeight || root.clientHeight));
          root.style.setProperty('--sway-viewport-width', `${width}px`);
          root.style.setProperty('--sway-viewport-height', `${height}px`);
          root.classList.toggle('is-compact-viewport', width <= 640 && height <= 760);
          root.classList.toggle('is-compact-landscape', height <= 480 && width > height);
        };

        root.classList.toggle('is-meta-in-app-browser', isMetaInAppBrowser);
        updateViewport();
        window.addEventListener('resize', updateViewport, { passive: true });
        window.addEventListener('orientationchange', updateViewport, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateViewport, { passive: true });
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --sway-viewport-width: 100vw;
        --sway-viewport-height: 100vh;
        --sway-safe-bottom: env(safe-area-inset-bottom, 0px);
        --sway-background-height: 100%;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f8fafc;
        background: #02030a;
        position: relative;
        overflow-x: hidden;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        height: 100vh;
        height: 100svh;
        height: var(--sway-viewport-height, 100vh);
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background: #02030a;
      }

      .backdrop img {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: var(--sway-background-height, 100%);
        object-fit: cover;
        object-position: 50% 50%;
        transform: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        padding: clamp(72px, 12vh, 132px) 16px 32px;
      }

      .cta-stack {
        display: grid;
        width: min(430px, 100%);
        gap: 12px;
        text-align: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #f8fafc;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        backdrop-filter: blur(16px);
        transition:
          opacity 1.15s cubic-bezier(0.4, 0, 0.2, 1) 0.52s,
          border-color 0.14s ease,
          background 0.14s ease,
          box-shadow 0.14s ease;
      }

      .btn.primary {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, rgba(219, 39, 219, 0.95), rgba(217, 70, 239, 0.92));
        border-color: rgba(244, 114, 182, 0.48);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.42);
      }

      .btn.secondary {
        background: rgba(2, 6, 23, 0.62);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .btn:hover {
        border-color: rgba(232, 121, 249, 0.55);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.26);
      }

      .tagline {
        position: relative;
        isolation: isolate;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        color: #f9c8ff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-shadow:
          0 0 8px rgba(244, 114, 182, 0.72),
          0 0 18px rgba(217, 70, 239, 0.46);
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.25s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .tagline::before {
        content: "";
        position: absolute;
        inset: 7px 24%;
        z-index: -1;
        border-radius: 999px;
        background: radial-gradient(ellipse at center, rgba(244, 114, 182, 0.26), rgba(34, 211, 238, 0.12) 42%, transparent 72%);
        filter: blur(8px);
        opacity: 0;
        transition: opacity 1.35s cubic-bezier(0.22, 1, 0.36, 1);
      }

      html.landing-ui-ready .tagline,
      html.landing-ui-ready .tagline::before {
        opacity: 1;
      }

      html.landing-ui-ready .tagline {
        pointer-events: auto;
      }

      html.landing-ui-ready .btn {
        opacity: 1;
        pointer-events: auto;
      }

      footer {
        width: min(1120px, calc(100% - 32px));
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        margin: 0 auto;
        padding: 22px 0 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1) 0.9s;
      }

      html.landing-ui-ready footer {
        opacity: 1;
        pointer-events: auto;
      }

      footer a {
        color: rgba(148, 163, 184, 0.76);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      footer a:hover { color: #e2e8f0; }

      .install-prompt[hidden] {
        display: none;
      }

      .install-prompt {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(16px + env(safe-area-inset-bottom));
        bottom: calc(16px + var(--sway-safe-bottom, 0px));
        z-index: 20;
        display: flex;
        justify-content: center;
        padding: 0 16px;
        pointer-events: none;
      }

      .install-card {
        width: min(100%, 432px);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.84));
        box-shadow: 0 24px 90px rgba(2, 6, 23, 0.62);
        color: #f8fafc;
        opacity: 0;
        pointer-events: auto;
        transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(24px);
      }

      .install-card::before {
        content: "";
        display: block;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(240, 171, 252, 0.86), rgba(103, 232, 249, 0.74));
      }

      .install-prompt.is-visible .install-card {
        opacity: 1;
      }

      .install-body {
        padding: 12px;
      }

      .install-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .install-icon {
        flex: 0 0 auto;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(240, 171, 252, 0.25);
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(217, 70, 239, 0.22), rgba(34, 211, 238, 0.14));
        box-shadow: 0 0 28px rgba(217, 70, 239, 0.24);
        font-size: 20px;
        font-weight: 900;
      }

      .install-copy {
        flex: 1;
        min-width: 0;
      }

      .install-kicker {
        margin: 0;
        color: #f5d0fe;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .install-title {
        margin: 4px 0 0;
        color: #ffffff;
        font-size: 15px;
        font-weight: 900;
        line-height: 1.15;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .install-detail {
        margin: 2px 0 0;
        color: rgba(203, 213, 225, 0.9);
        font-size: 11px;
        line-height: 1.45;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .install-dismiss {
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        color: rgba(226, 232, 240, 0.86);
        cursor: pointer;
        font: inherit;
        font-size: 20px;
        font-weight: 800;
        line-height: 1;
        padding: 0;
      }

      .install-action {
        flex: 0 0 auto;
        min-width: 84px;
        min-height: 42px;
        margin-top: 0;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(90deg, #d946ef, #22d3ee);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.34);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 900;
        padding: 0 12px;
      }

      .install-action:hover,
      .install-dismiss:hover {
        filter: brightness(1.08);
      }

      @media (max-width: 640px) {
        .backdrop img {
          object-position: 50% 50%;
        }

        main {
          align-items: center;
          justify-content: center;
          padding: 72px 16px calc(72px + env(safe-area-inset-bottom));
          padding: 72px 16px calc(72px + var(--sway-safe-bottom, 0px));
        }

        .cta-stack {
          width: min(100%, 390px);
          gap: 10px;
        }

        .btn {
          min-height: 56px;
          border-radius: 13px;
        }

        .tagline {
          min-height: 38px;
          font-size: 14px;
        }

        footer {
          width: min(100% - 24px, 390px);
          gap: 12px 16px;
          padding: 12px 0 calc(20px + env(safe-area-inset-bottom));
          padding: 12px 0 calc(20px + var(--sway-safe-bottom, 0px));
        }

        footer a {
          font-size: 11px;
        }

        .install-prompt {
          bottom: calc(10px + env(safe-area-inset-bottom));
          bottom: calc(10px + var(--sway-safe-bottom, 0px));
          padding: 0 12px;
        }

        .install-detail {
          display: none;
        }
      }

      @media (max-width: 640px) and (max-height: 760px) {
        main {
          padding-top: 46px;
          padding-bottom: calc(64px + env(safe-area-inset-bottom));
          padding-bottom: calc(64px + var(--sway-safe-bottom, 0px));
        }

        .cta-stack {
          gap: 9px;
        }

        .btn {
          min-height: 52px;
        }

        .tagline {
          min-height: 34px;
          font-size: 13px;
        }

        footer {
          gap: 8px 14px;
          padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
          padding: 8px 0 calc(12px + var(--sway-safe-bottom, 0px));
        }

        footer a {
          font-size: 10.5px;
        }
      }

      @media (max-height: 480px) and (orientation: landscape) {
        main {
          padding: 48px 16px 10px;
        }

        .cta-stack {
          width: min(430px, 52vw);
          gap: 8px;
        }

        .btn {
          min-height: 46px;
        }

        .tagline {
          min-height: 30px;
          font-size: 13px;
        }

        footer {
          width: min(calc(100% - 24px), 760px);
          gap: 10px 16px;
          padding: 6px 0 8px;
        }
      }

      html.is-meta-in-app-browser body {
        overscroll-behavior-y: none;
      }

      html.is-meta-in-app-browser .backdrop {
        position: fixed;
      }

      html.is-meta-in-app-browser .btn {
        -webkit-tap-highlight-color: transparent;
      }

      html.is-compact-viewport main {
        padding-top: 46px;
        padding-bottom: calc(64px + var(--sway-safe-bottom, 0px));
      }

      html.is-compact-viewport .cta-stack {
        gap: 9px;
      }

      html.is-compact-viewport .btn {
        min-height: 52px;
      }

      html.is-compact-viewport .tagline {
        min-height: 34px;
        font-size: 13px;
      }

      html.is-compact-viewport footer {
        gap: 8px 14px;
        padding: 8px 0 calc(12px + var(--sway-safe-bottom, 0px));
      }

      html.is-compact-viewport footer a {
        font-size: 10.5px;
      }

      html.is-compact-landscape main {
        padding: 48px 16px 10px;
      }

      html.is-compact-landscape .cta-stack {
        width: min(430px, 52vw);
        gap: 8px;
      }

      html.is-compact-landscape .btn {
        min-height: 46px;
      }

      html.is-compact-landscape .tagline {
        min-height: 30px;
        font-size: 13px;
      }

      html.is-compact-landscape footer {
        width: min(calc(100% - 24px), 760px);
        gap: 10px 16px;
        padding: 6px 0 8px;
      }

      @media (prefers-reduced-motion: reduce) {
        .btn,
        .tagline,
        .tagline::before,
        footer {
          opacity: 1;
          pointer-events: auto;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <img src="/assets/sway-neon-background.png" alt="" data-landing-background />
    </div>

    <div class="shell">
      <main>
        <nav class="cta-stack" aria-label="Sway entry actions">
          <a class="tagline" href="/faq">sway to play</a>
          <a class="btn primary" href="/home">SCAN</a>
          <a class="btn secondary" href="/talent/signup">Create account</a>
          <a class="btn secondary" href="/talent/login">Login</a>
        </nav>
      </main>

      <footer>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/faq">FAQ</a>
        <a href="/support">Support</a>
        <a href="/privacy/data-deletion">Data deletion</a>
      </footer>
    </div>

    <div class="install-prompt" id="public-install-prompt" role="dialog" aria-label="Install Sway" hidden>
      <section class="install-card">
        <div class="install-body">
          <div class="install-row">
            <div class="install-icon" aria-hidden="true">S</div>
            <div class="install-copy">
              <p class="install-kicker">Install Sway</p>
              <h2 class="install-title">Download Sway</h2>
              <p class="install-detail" data-install-copy>One tap from your home screen.</p>
            </div>
            <button class="install-action" type="button" data-install-action aria-label="Install app">Install</button>
            <button class="install-dismiss" type="button" data-install-dismiss aria-label="Not now">&times;</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      (() => {
        const root = document.documentElement;
        const image = document.querySelector('[data-landing-background]');
        let imageReady = false;
        let minimumDisplayDone = false;
        let revealed = false;

        const reveal = () => {
          if (revealed || !imageReady || !minimumDisplayDone) return;
          revealed = true;
          root.classList.add('landing-ui-ready');
        };

        window.setTimeout(() => {
          minimumDisplayDone = true;
          reveal();
        }, 760);

        window.setTimeout(() => {
          imageReady = true;
          minimumDisplayDone = true;
          reveal();
        }, 1800);

        if (!(image instanceof HTMLImageElement)) {
          imageReady = true;
          reveal();
          return;
        }

        const revealAfterImage = () => {
          imageReady = true;
          reveal();
        };
        if (image.complete && image.naturalWidth > 0) {
          revealAfterImage();
          return;
        }

        if ('decode' in image) {
          image.decode().then(revealAfterImage).catch(revealAfterImage);
          return;
        }

        image.addEventListener('load', revealAfterImage, { once: true });
        image.addEventListener('error', revealAfterImage, { once: true });
      })();
    </script>

    <script>
      (() => {
        const prompt = document.getElementById('public-install-prompt');
        if (!prompt) return;

        const dismissKey = 'sway.installPromptDismissed.v2';
        const isMetaInAppBrowser = /FBAN|FBAV|FB_IAB|FB4A|FBIOS|MessengerForiOS|FB_IAB\/MESSENGER/i.test(navigator.userAgent || '');
        const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || Boolean(navigator.standalone);
        const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent || '') || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const action = prompt.querySelector('[data-install-action]');
        const dismiss = prompt.querySelector('[data-install-dismiss]');
        const copy = prompt.querySelector('[data-install-copy]');
        let installEvent = null;

        const getDismissed = () => {
          try {
            return window.localStorage.getItem(dismissKey) === '1';
          } catch {
            return false;
          }
        };

        const setDismissed = () => {
          try {
            window.localStorage.setItem(dismissKey, '1');
          } catch {}
        };

        const hidePrompt = (remember) => {
          if (remember) setDismissed();
          prompt.classList.remove('is-visible');
          window.setTimeout(() => {
            prompt.hidden = true;
          }, 220);
        };

        const showPrompt = () => {
          if (isStandalone() || isMetaInAppBrowser || getDismissed()) return;
          prompt.hidden = false;
          window.requestAnimationFrame(() => prompt.classList.add('is-visible'));
        };

        dismiss?.addEventListener('click', () => hidePrompt(true));

        action?.addEventListener('click', async () => {
          if (!installEvent) {
            hidePrompt(true);
            return;
          }
          await installEvent.prompt();
          const choice = await installEvent.userChoice.catch(() => null);
          if (choice?.outcome === 'accepted' || choice?.outcome === 'dismissed') hidePrompt(true);
          installEvent = null;
        });

        window.addEventListener('beforeinstallprompt', (event) => {
          event.preventDefault();
          installEvent = event;
          if (action) action.textContent = 'Install';
          if (copy) copy.textContent = 'One tap from your home screen.';
          window.setTimeout(showPrompt, 900);
        });

        window.addEventListener('appinstalled', () => hidePrompt(true));

        if (isIos) {
          if (action) action.textContent = 'Got it';
          if (copy) copy.textContent = 'Share, then Add to Home Screen.';
          window.setTimeout(showPrompt, 900);
        }
      })();
    </script>
  </body>
</html>
