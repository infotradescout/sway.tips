<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sway — Live Tip Jar &amp; Request Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body class="bg-gray-950 text-gray-100 antialiased selection:bg-rose-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      if (import.meta.env.VITE_SWAY_DEMO_MODE === 'true') {
        const badge = document.createElement('div');
        badge.textContent = 'Demo preview data';
        badge.style.position = 'fixed';
        badge.style.top = '12px';
        badge.style.right = '12px';
        badge.style.zIndex = '10';
        badge.style.border = '1px solid rgba(255, 255, 255, 0.45)';
        badge.style.borderRadius = '999px';
        badge.style.background = 'rgba(11, 19, 43, 0.82)';
        badge.style.color = '#ffffff';
        badge.style.font = '700 11px "Space Grotesk", sans-serif';
        badge.style.letterSpacing = '0.08em';
        badge.style.textTransform = 'uppercase';
        badge.style.padding = '8px 10px';
        document.body.appendChild(badge);
      }
    </script>
  </body>
</html>
