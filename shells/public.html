<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07080c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/sway.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sway" />

    <meta property="og:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />

    <meta property="og:image:secure_url" content="https://sway.tips/assets/sway-s-only-no-text-background.png?v=1" />

    <meta property="og:image:height" content="1536" />
    <meta property="og:image:alt" content="Sway neon S background" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sway | Live Crowd Requests" />
    <meta name="twitter:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />
    <meta name="twitter:image" content="https://sway.tips/assets/sway-s-only-no-text-background.png?v=1" />
    <title>Sway | Live Crowd Requests</title>
    <meta
      name="description"
      content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const root = document.documentElement;
        const isMetaInAppBrowser = /FBAN|FBAV|FB_IAB|FB4A|FBIOS|MessengerForiOS|FB_IAB\/MESSENGER/i.test(navigator.userAgent || '');
        const updateViewport = () => {
          const viewport = window.visualViewport;
          const width = Math.max(1, Math.round((viewport && viewport.width) || window.innerWidth || root.clientWidth));
          const height = Math.max(1, Math.round((viewport && viewport.height) || window.innerHeight || root.clientHeight));
          root.style.setProperty('--sway-viewport-width', `${width}px`);
          root.style.setProperty('--sway-viewport-height', `${height}px`);
          root.classList.toggle('is-compact-viewport', width <= 640 && height <= 760);
          root.classList.toggle('is-compact-landscape', height <= 480 && width > height);
        };

        root.classList.toggle('is-meta-in-app-browser', isMetaInAppBrowser);
        updateViewport();
        window.addEventListener('resize', updateViewport, { passive: true });
        window.addEventListener('orientationchange', updateViewport, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateViewport, { passive: true });
          window.visualViewport.addEventListener('scroll', updateViewport, { passive: true });
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --sway-viewport-width: 100vw;
        --sway-viewport-height: 100vh;
        --sway-safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f8fafc;
        background: #02030a;
        position: relative;
        overflow-x: hidden;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        height: 100vh;
        height: 100svh;
        height: var(--sway-viewport-height, 100vh);
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 36%, rgba(217, 70, 239, 0.2), transparent 30%),
          radial-gradient(circle at 50% 78%, rgba(6, 182, 212, 0.24), transparent 30%),
          #02030a;
      }

      .landing-aurora-field,
      .landing-bg-art,
      .landing-orb-a,
      .landing-orb-b,
      .landing-orb-c,
      .landing-grid {
        position: absolute;
        user-select: none;
        -webkit-user-drag: none;
        will-change: transform, filter, opacity;
      }

      .landing-aurora-field {
        inset: -18%;
        background:
          linear-gradient(112deg, transparent 0 18%, rgba(236, 72, 153, 0.24) 34%, transparent 56%),
          linear-gradient(248deg, transparent 0 20%, rgba(34, 211, 238, 0.22) 42%, transparent 66%),
          linear-gradient(180deg, rgba(10, 3, 28, 0.72), rgba(2, 3, 10, 0.06) 42%, rgba(3, 12, 28, 0.7));
        filter: blur(16px) saturate(1.1);
        opacity: 0.74;
        transform-origin: center;
        animation: landing-aurora-pan 16s ease-in-out infinite alternate;
      }

      .landing-bg-art {
        left: 50%;
        top: 50%;
        width: min(92vw, 1080px);
        height: min(92vh, 1180px);
        height: min(calc(var(--sway-viewport-height, 100vh) * 0.92), 1180px);
        transform: translate(-50%, -50%);
        border-radius: 52% 48% 46% 54% / 42% 56% 44% 58%;
        background:
          radial-gradient(circle at 34% 34%, rgba(244, 114, 182, 0.52), transparent 44%),
          radial-gradient(circle at 70% 64%, rgba(34, 211, 238, 0.48), transparent 46%),
          radial-gradient(circle at 52% 56%, rgba(99, 102, 241, 0.34), transparent 52%);
        filter: blur(2px) saturate(1.14);
        mix-blend-mode: screen;
        opacity: 0.72;
        animation: landing-mesh-drift 12s ease-in-out infinite alternate;
      }

      .landing-orb-a,
      .landing-orb-b,
      .landing-orb-c {
        border-radius: 50%;
        mix-blend-mode: screen;
      }

      .landing-orb-a {
        left: 16%;
        top: 26%;
        width: min(42vw, 360px);
        height: min(42vw, 360px);
        background: radial-gradient(circle, rgba(217, 70, 239, 0.46), transparent 66%);
        filter: blur(6px);
        opacity: 0.62;
        animation: landing-orb-a 14s ease-in-out infinite alternate;
      }

      .landing-orb-b {
        right: 12%;
        bottom: 24%;
        width: min(46vw, 420px);
        height: min(46vw, 420px);
        background: radial-gradient(circle, rgba(6, 182, 212, 0.4), transparent 68%);
        filter: blur(8px);
        opacity: 0.6;
        animation: landing-orb-b 16s ease-in-out infinite alternate;
      }

      .landing-orb-c {
        left: 48%;
        top: 58%;
        width: min(34vw, 300px);
        height: min(34vw, 300px);
        background: radial-gradient(circle, rgba(129, 140, 248, 0.34), transparent 72%);
        filter: blur(5px);
        opacity: 0.46;
        animation: landing-orb-c 10s ease-in-out infinite alternate;
      }

      .landing-grid {
        inset: -8%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.16;
        transform: perspective(700px) rotateX(62deg) translateY(28%);
        transform-origin: center bottom;
        mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent 64%);
        -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent 64%);
        animation: landing-grid-drift 10s linear infinite;
      }

      .landing-wave-ribbon,
      .landing-neon-breathe,
      .landing-light-sweep,
      .landing-particles {
        position: absolute;
        pointer-events: none;
      }

      .landing-glow {
        position: absolute;
        inset: auto 0 0;
        height: 36vh;
        height: calc(var(--sway-viewport-height, 100vh) * 0.36);
        background: linear-gradient(90deg, rgba(236, 72, 153, 0.28), rgba(6, 182, 212, 0.28));
        filter: blur(18px);
        opacity: 0.58;
        animation: landing-neon-breathe 4.8s ease-in-out infinite;
      }

      .landing-wave-ribbon {
        left: -10%;
        right: -10%;
        bottom: 14%;
        height: 34vh;
        height: calc(var(--sway-viewport-height, 100vh) * 0.34);
        background:
          linear-gradient(105deg, transparent 0%, rgba(236, 72, 153, 0.34) 18%, transparent 35%),
          linear-gradient(78deg, transparent 22%, rgba(34, 211, 238, 0.32) 54%, transparent 80%),
          radial-gradient(ellipse at 48% 82%, rgba(236, 72, 153, 0.36), transparent 60%);
        filter: blur(6px);
        mix-blend-mode: screen;
        -webkit-mask-image: linear-gradient(to top, transparent, #000 26%, #000 74%, transparent);
        mask-image: linear-gradient(to top, transparent, #000 26%, #000 74%, transparent);
        animation: landing-wave-drift 5.6s ease-in-out infinite;
      }

      .landing-neon-breathe {
        left: 8%;
        right: 8%;
        bottom: 0;
        height: 30vh;
        height: calc(var(--sway-viewport-height, 100vh) * 0.3);
        background:
          radial-gradient(ellipse at 30% 58%, rgba(236, 72, 153, 0.28), transparent 56%),
          radial-gradient(ellipse at 70% 52%, rgba(34, 211, 238, 0.28), transparent 58%);
        filter: blur(12px);
        mix-blend-mode: screen;
        opacity: 0.72;
        animation: landing-neon-breathe 5.2s ease-in-out infinite reverse;
      }

      .landing-light-sweep {
        inset: -16% -36%;
        background: linear-gradient(110deg, transparent 20%, rgba(255, 255, 255, 0.24) 48%, transparent 64%);
        mix-blend-mode: screen;
        opacity: 0;
        animation: landing-light-sweep 6.8s ease-in-out infinite;
      }

      .landing-particles {
        inset: 0;
        background-image:
          radial-gradient(circle, rgba(244, 114, 182, 0.42) 0 1px, transparent 1.8px),
          radial-gradient(circle, rgba(34, 211, 238, 0.36) 0 1px, transparent 1.8px);
        background-position: 16% 64%, 82% 58%;
        background-size: 96px 96px, 128px 128px;
        filter: blur(0);
        opacity: 0.32;
        -webkit-mask-image: radial-gradient(ellipse at 50% 62%, transparent 0 24%, #000 48%, transparent 82%);
        mask-image: radial-gradient(ellipse at 50% 62%, transparent 0 24%, #000 48%, transparent 82%);
        animation: landing-particle-drift 10s linear infinite;
      }

      .landing-vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 50%, transparent 0 30%, rgba(2, 3, 10, 0.24) 58%, rgba(2, 3, 10, 0.86) 100%),
          linear-gradient(180deg, rgba(2, 3, 10, 0.5), rgba(2, 3, 10, 0.04) 38%, rgba(2, 3, 10, 0.62));
      }

      @keyframes landing-aurora-pan {
        0% {
          transform: scale(1.02) translate3d(-2.4%, -1.6%, 0);
          filter: blur(14px) saturate(1.04) brightness(0.9) contrast(1.03);
        }
        50% {
          transform: scale(1.08) translate3d(2.2%, 1%, 0);
          filter: blur(18px) saturate(1.14) brightness(1) contrast(1.05);
        }
        100% {
          transform: scale(1.04) translate3d(-1.2%, 2.2%, 0);
          filter: blur(15px) saturate(1.08) brightness(0.92) contrast(1.04);
        }
      }

      @keyframes landing-mesh-drift {
        0% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
          border-radius: 52% 48% 46% 54% / 42% 56% 44% 58%;
          opacity: 0.64;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.08) rotate(9deg);
          border-radius: 48% 52% 58% 42% / 54% 44% 56% 46%;
          opacity: 0.8;
        }
      }

      @keyframes landing-orb-a {
        0% { transform: translate3d(-6%, -4%, 0) scale(0.96); }
        100% { transform: translate3d(7%, 5%, 0) scale(1.08); }
      }

      @keyframes landing-orb-b {
        0% { transform: translate3d(5%, 4%, 0) scale(0.94); }
        100% { transform: translate3d(-8%, -6%, 0) scale(1.1); }
      }

      @keyframes landing-orb-c {
        0% { transform: translate3d(-4%, 4%, 0) scale(0.9); }
        100% { transform: translate3d(6%, -5%, 0) scale(1.12); }
      }

      @keyframes landing-grid-drift {
        0% { background-position: 0 0, 0 0; }
        100% { background-position: 0 42px, 42px 0; }
      }

      @keyframes landing-neon-breathe {
        0%, 100% { opacity: 0.46; transform: translateY(0) scaleX(1); }
        50% { opacity: 0.96; transform: translateY(-12px) scaleX(1.12); }
      }

      @keyframes landing-wave-drift {
        0%, 100% { transform: translateX(-4%) skewY(-1.5deg); opacity: 0.48; }
        50% { transform: translateX(4%) skewY(1.5deg); opacity: 0.96; }
      }

      @keyframes landing-light-sweep {
        0%, 22% { opacity: 0; transform: translateX(-72%) rotate(-8deg); }
        43% { opacity: 0.42; }
        68%, 100% { opacity: 0; transform: translateX(72%) rotate(-8deg); }
      }

      @keyframes landing-particle-drift {
        0% { background-position: 16% 64%, 82% 58%; }
        100% { background-position: 36% 56%, 66% 70%; }
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
        min-height: var(--sway-viewport-height, 100vh);
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 16px 16px calc(20vh + var(--sway-safe-bottom, 0px));
      }

      .cta-stack {
        display: grid;
        width: min(372px, 100%);
        gap: 12px;
        padding: 14px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(2, 6, 23, 0.34);
        box-shadow: 0 24px 72px rgba(2, 6, 23, 0.62);
        backdrop-filter: blur(8px);
        text-align: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 20px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #f8fafc;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
      }

      .btn.primary {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, rgba(219, 39, 219, 0.95), rgba(217, 70, 239, 0.92));
        border-color: rgba(244, 114, 182, 0.48);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.42);
      }

      .btn.secondary {
        background: rgba(2, 6, 23, 0.5);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(232, 121, 249, 0.55);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.26);
      }


      @media (max-width: 640px) {
        .landing-aurora-field {
          inset: -22%;
          opacity: 0.78;
        }

        .landing-bg-art {
          top: 40%;
          width: min(124vw, 700px);
          height: min(calc(var(--sway-viewport-height, 100vh) * 0.72), 760px);
          opacity: 0.78;
        }

        .landing-orb-a {
          left: 4%;
          top: 24%;
          width: min(62vw, 300px);
          height: min(62vw, 300px);
        }

        .landing-orb-b {
          right: -8%;
          bottom: 18%;
          width: min(72vw, 360px);
          height: min(72vw, 360px);
        }

        .landing-orb-c {
          left: 42%;
          top: 54%;
          width: min(46vw, 220px);
          height: min(46vw, 220px);
        }

        .landing-wave-ribbon {
          bottom: 24%;
          height: 26vh;
          filter: blur(5px);
        }

        .landing-particles {
          opacity: 0.26;
          background-size: 82px 82px, 112px 112px;
        }

        main {
          align-items: flex-end;
          padding: 12px 16px calc(16vh + var(--sway-safe-bottom, 0px));
        }

        .cta-stack {
          width: min(100%, 368px);
          gap: 10px;
          padding: 12px;
          border-radius: 20px;
        }

        .btn {
          min-height: 56px;
          border-radius: 13px;
        }

      }

      @media (max-width: 640px) and (max-height: 760px) {
        .landing-bg-art {
          top: 36%;
          width: min(120vw, 560px);
          height: min(calc(var(--sway-viewport-height, 100vh) * 0.64), 620px);
        }

        main {
          padding-bottom: calc(11vh + var(--sway-safe-bottom, 0px));
        }

        .cta-stack {
          gap: 9px;
        }

        .btn {
          min-height: 50px;
        }

      }

      @media (max-height: 480px) and (orientation: landscape) {
        .landing-bg-art {
          width: min(82vw, 680px);
          height: min(calc(var(--sway-viewport-height, 100vh) * 0.88), 500px);
        }

        .landing-wave-ribbon {
          bottom: 10%;
          height: 34vh;
        }

        main {
          padding: 24px 16px 16px;
        }

        .cta-stack {
          width: min(430px, 52vw);
          gap: 8px;
        }

        .btn {
          min-height: 46px;
        }

      }

      html.is-meta-in-app-browser body {
        overscroll-behavior-y: none;
      }

      html.is-meta-in-app-browser .backdrop {
        position: absolute;
      }

      html.is-meta-in-app-browser .btn {
        -webkit-tap-highlight-color: transparent;
      }

      html.is-compact-viewport .landing-bg-art {
        top: 36%;
        width: min(120vw, 560px);
        height: min(calc(var(--sway-viewport-height, 100vh) * 0.64), 620px);
      }

      html.is-compact-viewport main {
        padding-bottom: calc(11vh + var(--sway-safe-bottom, 0px));
      }

      html.is-compact-viewport .cta-stack {
        gap: 9px;
      }

      html.is-compact-viewport .btn {
        min-height: 50px;
      }


      html.is-compact-landscape .landing-bg-art {
        width: min(82vw, 680px);
        height: min(calc(var(--sway-viewport-height, 100vh) * 0.88), 500px);
      }

      html.is-compact-landscape .landing-wave-ribbon {
        bottom: 10%;
        height: calc(var(--sway-viewport-height, 100vh) * 0.34);
      }

      html.is-compact-landscape main {
        padding: 48px 16px 10px;
      }

      html.is-compact-landscape .cta-stack {
        width: min(430px, 52vw);
        gap: 8px;
      }

      html.is-compact-landscape .btn {
        min-height: 46px;
      }

      @media (prefers-reduced-motion: reduce) {
        .landing-aurora-field,
        .landing-bg-art,
        .landing-orb-a,
        .landing-orb-b,
        .landing-orb-c,
        .landing-grid,
        .landing-glow,
        .landing-wave-ribbon,
        .landing-neon-breathe,
        .landing-light-sweep,
        .landing-particles { animation: none; }
        .btn { transition: none; }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <div class="landing-aurora-field"></div>
      <div class="landing-bg-art"></div>
      <div class="landing-orb-a"></div>
      <div class="landing-orb-b"></div>
      <div class="landing-orb-c"></div>
      <div class="landing-grid"></div>
      <div class="landing-wave-ribbon"></div>
      <div class="landing-neon-breathe"></div>
      <div class="landing-light-sweep"></div>
      <div class="landing-particles"></div>
      <div class="landing-glow"></div>
      <div class="landing-vignette"></div>
    </div>

    <div class="shell">
      <main>
        <nav class="cta-stack" aria-label="Sway entry actions">
          <a class="btn primary" href="/home">SCAN</a>
          <a class="btn secondary" href="/talent/signup">Create account</a>
          <a class="btn secondary" href="/talent/login">Login</a>
        </nav>
      </main>

    </div>
  </body>
</html>
