    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sway | Live Crowd Requests" />
    <meta name="twitter:description" content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time." />
    <meta name="twitter:image" content="https://sway.tips/assets/sway-s-only-no-text-background.png?v=1" />
    <title>Sway | Live Crowd Requests</title>
    <meta
      name="description"
      content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100svh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f8fafc;
        background: #02030a;
        position: relative;
        overflow-x: hidden;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 42%, rgba(217, 70, 239, 0.18), transparent 34%),
          radial-gradient(circle at 50% 78%, rgba(6, 182, 212, 0.18), transparent 28%),
          #02030a;
      }

      .landing-bg-fill,
      .landing-bg-art {
        position: absolute;
        left: 50%;
        top: 50%;
        user-select: none;
        -webkit-user-drag: none;
      }

      .landing-bg-fill {
        width: 110vw;
        height: 110vh;
        object-fit: cover;
        transform: translate(-50%, -50%) scale(1.02);
        filter: blur(10px) saturate(1.22);
        opacity: 0.64;
      }

      .landing-bg-art {
        width: min(84vw, 980px);
        height: min(94vh, 1320px);
        object-fit: contain;
        transform: translate(-50%, -50%);
        mix-blend-mode: screen;
        opacity: 0.86;
        -webkit-mask-image: radial-gradient(ellipse at 50% 53%, #000 0 46%, rgba(0, 0, 0, 0.72) 58%, transparent 76%);
        mask-image: radial-gradient(ellipse at 50% 53%, #000 0 46%, rgba(0, 0, 0, 0.72) 58%, transparent 76%);
        animation: landing-bg-breathe 18s ease-in-out infinite;
      }

      .landing-glow {
        position: absolute;
        inset: auto 0 0;
        height: 36vh;
        background: linear-gradient(90deg, rgba(236, 72, 153, 0.22), rgba(6, 182, 212, 0.22));
        filter: blur(54px);
        opacity: 0.48;
      }

      .landing-vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 52%, transparent 0 28%, rgba(2, 3, 10, 0.28) 58%, rgba(2, 3, 10, 0.82) 100%),
          linear-gradient(180deg, rgba(2, 3, 10, 0.42), rgba(2, 3, 10, 0.08) 36%, rgba(2, 3, 10, 0.58));
      }

      @keyframes landing-bg-breathe {
        0%, 100% { transform: translate(-50%, -50%) scale(1); filter: saturate(1.05); }
        50% { transform: translate(-50%, -50%) scale(1.025); filter: saturate(1.22); }
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(72px, 12vh, 132px) 16px 32px;
      }

      .cta-stack {
        display: grid;
        width: min(430px, 100%);
        gap: 12px;
        text-align: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #f8fafc;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
      }

      .btn.primary {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, rgba(219, 39, 219, 0.95), rgba(217, 70, 239, 0.92));
        border-color: rgba(244, 114, 182, 0.48);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.42);
      }

      .btn.secondary {
        background: rgba(2, 6, 23, 0.62);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(232, 121, 249, 0.55);
        box-shadow: 0 0 34px rgba(217, 70, 239, 0.26);
      }

      .tagline {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        color: #f0abfc;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-shadow: 0 0 18px rgba(217, 70, 239, 0.58);
      }

      footer {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 22px 0 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: center;
      }

      footer a {
        color: rgba(148, 163, 184, 0.76);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      footer a:hover { color: #e2e8f0; }

      @media (max-width: 640px) {
        .landing-bg-art {
          width: min(118vw, 720px);
          height: min(86vh, 980px);
          opacity: 0.9;
        }

        main {
          align-items: flex-end;
          padding-top: 52px;
          padding-bottom: 48px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .landing-bg-art { animation: none; }
        .btn { transition: none; }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <img class="landing-bg-fill" src="/assets/sway-s-only-no-text-background.png" alt="" decoding="async" />
      <img class="landing-bg-art" src="/assets/sway-s-only-no-text-background.png" alt="" decoding="async" />
      <div class="landing-glow"></div>
      <div class="landing-vignette"></div>
    </div>

    <div class="shell">
      <main>
        <nav class="cta-stack" aria-label="Sway entry actions">
          <a class="btn primary" href="https://app.sway.tips/">SCAN</a>
          <a class="btn secondary" href="/talent/signup">Create account</a>
          <a class="btn secondary" href="/talent/login">Login</a>
          <a class="tagline" href="/">sway to play</a>
        </nav>
      </main>

      <footer>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/support">Support</a>
        <a href="/privacy/data-deletion">Data deletion</a>
        <a href="/overlay/live">Open overlay</a>
      </footer>
    </div>
  </body>
</html>
