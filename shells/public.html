    <title>Sway | Live Crowd Requests</title>
    <meta
      name="description"
      content="Sway is a live request and tipping app for performers and DJs. Fans scan, request, tip, and follow the queue in real time."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; }

      body {
        min-height: 100vh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f1f5f9;
        background: #020617;
        position: relative;
        overflow-x: hidden;
      }

      .backdrop { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
      .grid-bg {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(192, 38, 211, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(192, 38, 211, 0.05) 1px, transparent 1px);
        background-size: 24px 24px;
      }
      .orb { position: absolute; border-radius: 999px; filter: blur(110px); }
      .orb-1 { top: -160px; left: 8%; width: 420px; height: 420px; background: rgba(192, 38, 211, 0.3); animation: drift 14s ease-in-out infinite; }
      .orb-2 { top: 33%; right: -96px; width: 380px; height: 380px; background: rgba(34, 211, 238, 0.25); animation: drift-slow 20s ease-in-out infinite; }
      .orb-3 { bottom: -128px; left: 25%; width: 360px; height: 360px; background: rgba(124, 58, 237, 0.25); animation: drift-reverse 17s ease-in-out infinite; }
      .orb-4 { bottom: 0; right: 12%; width: 300px; height: 300px; background: rgba(236, 72, 153, 0.2); animation: drift-slow 20s ease-in-out infinite; }

      @keyframes drift {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(34px, 24px) scale(1.08); }
      }
      @keyframes drift-slow {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-28px, 26px) scale(1.06); }
      }
      @keyframes drift-reverse {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(24px, -22px) scale(1.1); }
      }

      .shell { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

      .topbar {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 0;
      }
      .wordmark { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #fff; }
      .wordmark .flame {
        display: inline-flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; border-radius: 8px;
        background: rgba(192, 38, 211, 0.12); color: #e879f9;
      }
      .wordmark .flame svg { width: 16px; height: 16px; }
      .badge svg { width: 32px; height: 32px; }
      .wordmark span.label { font-size: 12px; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase; }

      .ghost {
        display: inline-flex; align-items: center; justify-content: center;
        min-height: 38px; padding: 0 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        font-weight: 700; font-size: 13px;
        text-decoration: none;
        transition: border-color 0.15s ease, color 0.15s ease;
      }
      .ghost:hover { border-color: rgba(232, 121, 249, 0.4); color: #fff; }

      main { flex: 1; display: flex; align-items: center; }

      .hero {
        width: min(420px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
        text-align: center;
      }

      .badge {
        display: inline-flex; align-items: center; justify-content: center;
        width: 64px; height: 64px; margin-bottom: 24px;
        border-radius: 18px;
        border: 1px solid rgba(192, 38, 211, 0.3);
        background: rgba(192, 38, 211, 0.1);
        color: #e879f9;
        box-shadow: 0 0 20px rgba(192, 38, 211, 0.4);
        font-size: 28px;
      }

      h1 {
        margin: 0 0 36px;
        font-size: clamp(36px, 8vw, 48px);
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
      h1 .grad {
        background: linear-gradient(110deg, #e879f9 0%, #f0abfc 52%, #67e8f9 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
      }

      .cta-stack { display: grid; gap: 12px; }

      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        min-height: 56px; padding: 0 20px;
        border-radius: 12px;
        font-weight: 900; font-size: 16px;
        text-decoration: none;
        transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
      }
      .btn.primary {
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        background: linear-gradient(90deg, #c026d3, #d946ef);
        box-shadow: 0 0 20px rgba(192, 38, 211, 0.4);
      }
      .btn.primary:hover { transform: scale(1.02); background: linear-gradient(90deg, #d946ef, #e879f9); }
      .btn.secondary {
        color: #f1f5f9;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(2, 6, 23, 0.6);
      }
      .btn.secondary:hover { border-color: rgba(232, 121, 249, 0.4); color: #fff; }

      footer {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
        display: flex; flex-wrap: wrap; gap: 16px;
        align-items: center; justify-content: center;
      }
      footer a { color: #64748b; font-size: 12px; text-decoration: none; }
      footer a:hover { color: #cbd5e1; }
    </style>
  </head>
  <body>
    <div class="backdrop">
      <div class="grid-bg"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="orb orb-4"></div>
    </div>

    <div class="shell">
      <header class="topbar">
        <a class="wordmark" href="/">
          <span class="flame" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"/></svg>
          </span>
          <span class="label">Sway</span>
        </a>
        <a class="ghost" href="/talent/login">Performer sign in</a>
      </header>

      <main>
        <section class="hero">
          <div class="badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"/></svg>
          </div>
          <h1>Run the room.<br /><span class="grad">Move the queue.</span></h1>
          <div class="cta-stack">
            <a class="btn primary" href="https://app.sway.tips/">Audience: join a live room</a>
            <a class="btn secondary" href="/talent/signup">Create account</a>
            <a class="btn secondary" href="/talent/login">Login</a>
          </div>
        </section>
      </main>

      <footer>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/support">Support</a>
        <a href="/privacy/data-deletion">Data deletion</a>
        <a href="/overlay/live">Open overlay</a>
      </footer>
    </div>
  </body>
</html>
