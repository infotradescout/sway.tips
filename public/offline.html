<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sway | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07080c;
        --panel: #11141b;
        --line: rgba(255,255,255,0.12);
        --text: #f6f8ff;
        --muted: #9aa2b6;
        --accent: #35d59a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(700px 420px at 20% -10%, rgba(53, 213, 154, 0.15), transparent 60%),
          radial-gradient(760px 520px at 90% 0%, rgba(124, 92, 255, 0.17), transparent 60%),
          var(--bg);
        color: var(--text);
        font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
        padding: 24px;
      }
      main {
        width: min(100%, 460px);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(17, 20, 27, 0.92);
        padding: 28px;
      }
      .eyebrow {
        display: inline-flex;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 10px;
        color: var(--accent);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 10px;
        font-size: 34px;
        line-height: 1.04;
      }
      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.65;
      }
      a {
        color: white;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">Sway app</span>
      <h1>You are offline.</h1>
      <p>Sway needs a connection to load live room state, requests, and performer actions.</p>
      <p>Reconnect, then reopen the room QR or refresh the app.</p>
      <p><a href="/home">Return to Sway</a></p>
    </main>
  </body>
</html>
