# Manual approved-SHA deploy path. Does not run on push to main.
# Requires Render Auto-Deploy Off (see RELEASE_CONTROL.md).
name: Approved Production Deploy

on:
  workflow_dispatch:
    inputs:
      approved_sha:
        description: Full git SHA approved for production deploy.
        required: true
        type: string
      confirm_production:
        description: Type exactly DEPLOY_PRODUCTION to proceed.
        required: true
        type: string

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    concurrency:
      group: sway-approved-production-deploy
      cancel-in-progress: false
    steps:
      - name: Reject accidental confirmations
        env:
          CONFIRM: ${{ inputs.confirm_production }}
          APPROVED_SHA: ${{ inputs.approved_sha }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "DEPLOY_PRODUCTION" ]; then
            echo "::error::Refusing deploy. confirm_production must be exactly DEPLOY_PRODUCTION."
            exit 1
          fi
          if ! [[ "$APPROVED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::approved_sha must be a full 40-char commit SHA."
            exit 1
          fi

      - name: Checkout approved SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.approved_sha }}

      - name: Verify checked-out commit matches approved SHA
        env:
          APPROVED_SHA: ${{ inputs.approved_sha }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$HEAD_SHA" != "$APPROVED_SHA" ]; then
            echo "::error::Checkout mismatch. HEAD=$HEAD_SHA approved=$APPROVED_SHA"
            exit 1
          fi

      - name: Require successful CI check for approved SHA
        env:
          GH_TOKEN: ${{ github.token }}
          APPROVED_SHA: ${{ inputs.approved_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CONCLUSION="$(gh api "repos/${REPO}/commits/${APPROVED_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name=="validate") | .conclusion' \
            | head -n 1)"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI check 'validate' is not success for ${APPROVED_SHA} (got: ${CONCLUSION:-missing})."
            echo "Fix GitHub Actions billing/minutes, re-run CI, then dispatch deploy."
            exit 1
          fi
          echo "CI gate passed: validate=success for ${APPROVED_SHA}"

      - name: Verify deploy hook is configured
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK}" ]; then
            echo "::error::Missing secret RENDER_DEPLOY_HOOK_URL. Deploy was NOT triggered."
            echo "Use Render Dashboard Manual Deploy for SHA ${{ inputs.approved_sha }} instead."
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          APPROVED_SHA: ${{ inputs.approved_sha }}
        run: |
          set -euo pipefail
          echo "Triggering Render deploy hook for approved SHA ${APPROVED_SHA}"
          HTTP_CODE="$(curl -sS -o /tmp/render-hook-body.txt -w "%{http_code}" -X POST "${HOOK}")"
          BODY="$(cat /tmp/render-hook-body.txt || true)"
          echo "Render hook HTTP ${HTTP_CODE}"
          echo "$BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Render deploy hook failed (HTTP ${HTTP_CODE}). Deploy NOT confirmed."
            exit 1
          fi
          echo "Render deploy hook accepted the request. Confirm /api/build-marker separately."
