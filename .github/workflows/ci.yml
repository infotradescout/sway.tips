name: CI Validation Gate 1

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sway
          POSTGRES_PASSWORD: sway
          POSTGRES_DB: sway_tips
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sway -d sway_tips"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://sway:sway@localhost:5432/sway_tips
      APP_URL: http://localhost:3000
      PERSISTENCE_DRIVER: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Contract Tests
        run: npm run test:contracts

      - name: Run Contract Audit
        run: npm run audit:contracts

      - name: Run Lint
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Run Drizzle Check
        run: npm run db:check

      - name: Run Active Blocks Postgres Integration Test
        run: npm run test:integration:moderation-active-blocks

      - name: Run Business Store Process-Kill Integration Test
        run: npm run test:integration:business-store-process-kill

      - name: Run Identity Ownership Durable Integration Test
        run: npm run test:integration:identity-ownership-durable

      - name: Create Audio File Collaboration Disposable Proof Database
        run: PGPASSWORD=sway psql -h localhost -U sway -d sway_tips -c "CREATE DATABASE sway_audio_file_collaboration_proof_ci;"

      - name: Run Audio File Collaboration Integration Proof
        run: npm run test:integration:audio-file-collaboration
        env:
          DATABASE_URL: postgres://sway:sway@localhost:5432/sway_audio_file_collaboration_proof_ci
          SWAY_DISPOSABLE_MIGRATION_PROOF: '1'

      # Pro Mode (Phase 2 Slice 1A) disposable proofs. Each targets its own
      # freshly created, uniquely named database inside the same ephemeral
      # CI Postgres service -- the service container itself is discarded at
      # job end, so no explicit drop step is needed here (unlike local dev,
      # where the same long-lived container persists across many runs).
      - name: Create Pro Mode Disposable Proof Databases
        run: |
          PGPASSWORD=sway psql -h localhost -U sway -d sway_tips -c "CREATE DATABASE sway_pro_mode_migration_proof_ci;"
          PGPASSWORD=sway psql -h localhost -U sway -d sway_tips -c "CREATE DATABASE sway_pro_mode_concurrency_proof_ci;"
          PGPASSWORD=sway psql -h localhost -U sway -d sway_tips -c "CREATE DATABASE sway_pro_mode_lifecycle_proof_ci;"
          PGPASSWORD=sway psql -h localhost -U sway -d sway_tips -c "CREATE DATABASE sway_public_state_projection_proof_ci;"

      - name: Run Pro Mode Migration Integration Proof
        run: npm run test:integration:pro-mode-migration
        env:
          DATABASE_URL: postgres://sway:sway@localhost:5432/sway_pro_mode_migration_proof_ci
          SWAY_DISPOSABLE_MIGRATION_PROOF: '1'

      - name: Run Pro Mode Concurrency Integration Proof
        run: npm run test:integration:pro-mode-concurrency
        env:
          DATABASE_URL: postgres://sway:sway@localhost:5432/sway_pro_mode_concurrency_proof_ci
          SWAY_DISPOSABLE_MIGRATION_PROOF: '1'

      - name: Run Pro Mode Account Lifecycle Integration Proof
        run: npm run test:integration:pro-mode-account-lifecycle
        env:
          DATABASE_URL: postgres://sway:sway@localhost:5432/sway_pro_mode_lifecycle_proof_ci
          SWAY_DISPOSABLE_MIGRATION_PROOF: '1'

      # Proves the public/performer room-state projection boundary: patrons
      # and any unauthenticated caller never receive internal fields (payment
      # identifiers, idempotency keys, device hashes, moderation flags), a
      # patron's own status never bleeds into or out of another patron's, and
      # the performer still gets the full operational state needed to run
      # the room. See PR #109.
      - name: Run Public Room State Projection Integration Proof
        run: npm run test:integration:public-room-state-projection
        env:
          DATABASE_URL: postgres://sway:sway@localhost:5432/sway_public_state_projection_proof_ci
          SWAY_DISPOSABLE_MIGRATION_PROOF: '1'
