services:
  - type: web
    name: sway-tips-web
    runtime: node
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /api/build-marker
    domains:
      - sway.tips
      - www.sway.tips
      - app.sway.tips
    envVars:
      - key: NODE_ENV
        value: production
      - key: SWAY_AUDIO_STORAGE_PROVIDER
        value: r2
      - key: SWAY_AUDIO_R2_BUCKET
        value: sway-audio-originals
      - key: SWAY_AUDIO_R2_ACCOUNT_ID
        sync: false
      - key: SWAY_AUDIO_R2_ACCESS_KEY_ID
        sync: false
      - key: SWAY_AUDIO_R2_SECRET_ACCESS_KEY
        sync: false
